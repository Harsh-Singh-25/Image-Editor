<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Image Editor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="left">
          <div class="top">
            <label for="image-input" class="btn"
              >Choose Image
              <input type="file" id="image-input" accept="image/*" hidden />
            </label>
            <button class="btn" id="reset-btn">Reset</button>
            <button class="btn" id="download-btn">Download</button>
          </div>
          <div class="bottom">
            <div class="placeholder">
              <i class="ri-folder-image-line"></i>
              <p>NO image is choosen</p>
            </div>
            <canvas id="image-canvas"></canvas>
          </div>
        </div>
        <div class="right">
          <h2>Filters</h2>
          <div class="filters">
            <div class="filter">
              <!-- <p>Brightness</p>
                        <input name="brightness" value="100" type="range" min="0" max="200"> -->
              <div class="presets">
                <button class="preset-btn" data-preset="normal">Normal</button>
                <button class="preset-btn" data-preset="vintage">
                  Vintage
                </button>
                <button class="preset-btn" data-preset="blackWhite">B&W</button>
                <button class="preset-btn" data-preset="cool">Cool</button>
                <button class="preset-btn" data-preset="warm">Warm</button>
                <button class="preset-btn" data-preset="dramatic">
                  Dramatic
                </button>
                <button class="preset-btn" data-preset="faded">Faded</button>
                <button class="preset-btn" data-preset="cyberpunk">
                  Cyberpunk
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
